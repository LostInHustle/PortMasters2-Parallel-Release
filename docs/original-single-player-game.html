<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PortMasters: Lords of the Silk Road</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
        background: #e6f2ff;
        color: #1a237e;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #app {
        max-width: 1600px;
        margin: 0 auto;
        padding: 10px;
        display: grid;
        grid-template-columns: 280px 1fr;
        grid-template-rows: auto 1fr auto auto;
        gap: 8px;
        min-height: 100vh;
      }
      .header {
        grid-column: 1 / -1;
        background: #1a3c8c;
        color: #ffd700;
        padding: 12px 20px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .header h1 {
        font-size: 22px;
        font-weight: bold;
      }
      .header .subtitle {
        color: white;
        font-size: 12px;
      }
      .header .shortcuts {
        color: #aac4e8;
        font-size: 10px;
      }

      .status-panel {
        grid-row: 2;
        background: #f0f8ff;
        border: 2px solid #2e5aa7;
        border-radius: 8px;
        padding: 12px;
        overflow-y: auto;
        max-height: calc(100vh - 220px);
      }
      .status-section {
        background: #f0f8ff;
        border: 1px solid #2e5aa7;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .status-section h3 {
        color: #1a3c8c;
        font-size: 13px;
        margin-bottom: 8px;
        border-bottom: 1px solid #2e5aa7;
        padding-bottom: 4px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
        font-size: 12px;
      }
      .stat-value {
        font-weight: bold;
        color: #2e5aa7;
      }
      .stat-money {
        color: #4caf50;
        font-weight: bold;
        font-size: 14px;
      }
      .stat-score {
        color: #1a237e;
      }
      .inv-item {
        display: flex;
        align-items: center;
        padding: 2px 0;
        font-size: 11px;
      }
      .inv-item .icon {
        margin-right: 4px;
      }
      .inv-item .name {
        flex: 1;
      }
      .inv-item .count {
        font-weight: bold;
        min-width: 30px;
        text-align: right;
      }

      .phase-panel {
        grid-row: 2;
        background: #f0f8ff;
        border: 2px solid #2e5aa7;
        border-radius: 8px;
        padding: 16px;
        overflow-y: auto;
        max-height: calc(100vh - 220px);
        position: relative;
      }

      .control-panel {
        grid-column: 1 / -1;
        background: #1a3c8c;
        padding: 8px 12px;
        border-radius: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .log-panel {
        grid-column: 1 / -1;
        background: #f8f9fa;
        border: 1px solid #2e5aa7;
        border-radius: 8px;
        padding: 8px;
        height: 140px;
        overflow-y: auto;
        font-size: 11px;
        font-family: "Consolas", monospace;
      }
      .log-entry {
        padding: 2px 4px;
        border-bottom: 1px dotted #ddd;
      }

      .btn {
        background: #2e5aa7;
        color: white;
        border: 2px solid;
        border-color: #5a85d6 #1a3c8c #1a3c8c #5a85d6;
        padding: 8px 16px;
        font-family: inherit;
        font-weight: bold;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.1s;
        user-select: none;
      }
      .btn:hover:not(:disabled) {
        filter: brightness(1.2);
      }
      .btn:active:not(:disabled) {
        border-color: #1a3c8c #5a85d6 #5a85d6 #1a3c8c;
        transform: translateY(1px);
      }
      .btn:disabled {
        background: #888;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-success {
        background: #4caf50;
        border-color: #7cd67f #2d7a30 #2d7a30 #7cd67f;
      }
      .btn-warning {
        background: #ff9800;
        border-color: #ffb84d #b36b00 #b36b00 #ffb84d;
        color: white;
      }
      .btn-danger {
        background: #ff5252;
        border-color: #ff8585 #c62828 #c62828 #ff8585;
      }
      .btn-gold {
        background: #ffd700;
        color: #1a237e;
        border-color: #ffe766 #b39700 #b39700 #ffe766;
      }
      .btn-grey {
        background: #424242;
        border-color: #666 #222 #222 #666;
      }
      .btn-lg {
        padding: 12px 24px;
        font-size: 14px;
      }
      .btn-xl {
        padding: 15px 30px;
        font-size: 16px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 14px;
        padding: 10px;
      }
      .card {
        background: #f0f8ff;
        border: 2px solid #2e5aa7;
        border-radius: 8px;
        padding: 0;
        display: flex;
        flex-direction: column;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      .card-header {
        background: #e6f2ff;
        padding: 10px 14px;
        border-bottom: 2px solid #2e5aa7;
        font-weight: bold;
        font-size: 14px;
        color: #1a3c8c;
        text-align: center;
      }
      .card-body {
        padding: 12px 14px;
        flex: 1;
      }
      .card-footer {
        padding: 10px 14px;
        border-top: 1px solid #ddd;
      }

      .resource-row {
        display: flex;
        align-items: center;
        padding: 4px 0;
        font-size: 12px;
      }
      .resource-row .icon {
        font-size: 16px;
        margin-right: 6px;
      }
      .resource-row .name {
        font-weight: bold;
        min-width: 90px;
      }
      .resource-row .qty {
        margin: 0 6px;
      }
      .resource-row .price {
        color: #666;
        margin-left: auto;
      }
      .resource-row .inv-status {
        margin-left: 8px;
        font-size: 11px;
      }

      .hero-title {
        font-size: 28px;
        font-weight: bold;
        color: #1a3c8c;
        text-align: center;
        margin: 20px 0 10px;
      }
      .subtitle-text {
        font-size: 14px;
        color: #2e5aa7;
        text-align: center;
        margin-bottom: 20px;
      }
      .center-block {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }
      .modal {
        background: #e6f2ff;
        border: 3px solid #2e5aa7;
        border-radius: 12px;
        padding: 24px;
        max-width: 650px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      .modal h2 {
        color: #1a3c8c;
        margin-bottom: 16px;
        text-align: center;
      }
      .modal pre {
        background: white;
        padding: 12px;
        border-radius: 6px;
        white-space: pre-wrap;
        font-family: inherit;
        font-size: 12px;
        max-height: 400px;
        overflow-y: auto;
      }

      .boon-card,
      .module-card {
        background: #f0f8ff;
        border: 3px solid #2e5aa7;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        transition: transform 0.2s;
      }
      .boon-card:hover,
      .module-card:hover {
        transform: translateY(-4px);
      }
      .boon-icon,
      .module-icon {
        font-size: 48px;
        margin: 10px 0;
      }
      .boon-name,
      .module-name {
        font-size: 16px;
        font-weight: bold;
        color: #1a3c8c;
        margin: 8px 0;
      }
      .boon-desc,
      .module-desc {
        font-size: 12px;
        color: #333;
        margin: 10px 0;
        min-height: 60px;
      }

      .tip-list {
        text-align: left;
        max-width: 600px;
        margin: 20px auto;
      }
      .tip-list div {
        padding: 4px 0;
        font-size: 13px;
      }
      .separator {
        height: 2px;
        background: #2e5aa7;
        margin: 16px 0;
      }
      .profit-positive {
        color: #4caf50;
        font-weight: bold;
      }
      .profit-negative {
        color: #ff5252;
        font-weight: bold;
      }

      #particles-canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
      }

      .shake {
        animation: shake 0.3s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translate(0, 0);
        }
        20% {
          transform: translate(-4px, -4px);
        }
        40% {
          transform: translate(4px, 4px);
        }
        60% {
          transform: translate(-2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
      }

      .worker-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: white;
        padding: 8px 12px;
        margin: 4px 0;
        border-radius: 4px;
        border: 1px solid #ddd;
        font-size: 12px;
      }

      .inv-section-title {
        color: #2e5aa7;
        font-weight: bold;
        font-size: 11px;
        padding: 4px 0;
        border-bottom: 1px solid #2e5aa7;
        margin: 6px 0 4px;
      }

      @media (max-width: 900px) {
        #app {
          grid-template-columns: 1fr;
        }
        .status-panel {
          max-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <div>
          <h1>⚓ PortMasters 🚢</h1>
          <div class="subtitle">
            Maritime Trade | Vessel Upgrades | Artisan Crafting | Taxation
          </div>
        </div>
        <div class="shortcuts">
          Shortcuts: Ctrl+S Save | Ctrl+N Next | Ctrl+H Artisans | Ctrl+R
          Restart | F1 Help
        </div>
      </div>

      <div class="status-panel" id="status-panel"></div>
      <div class="phase-panel" id="phase-panel"></div>

      <div class="control-panel" id="control-panel"></div>
      <div class="log-panel" id="log-panel"></div>
    </div>

    <canvas id="particles-canvas"></canvas>
    <div id="modal-root"></div>

    <script>
      "use strict";
      // =====================================================================
      // PortMasters: Lords of the Silk Road
      // [BLIZZARD_ENGINEERING] Production Build v1.3.0-ENG
      // =====================================================================

      const ICONS = {
        Hemp: "🧶",
        Silk: "👘",
        Tea: "🍵",
        "Linen Clothes": "👔",
        "Cotton Clothes": "👕",
        Brocade: "👗",
        Sachet: "🌸",
      };
      const COLORS = {
        Hemp: "#8B7355",
        Silk: "#DC143C",
        Tea: "#228B22",
        "Linen Clothes": "#D2691E",
        "Cotton Clothes": "#4169E1",
        Brocade: "#8B008B",
        Sachet: "#FF1493",
      };
      const RESOURCES = ["Hemp", "Silk", "Tea"];
      const PRODUCTS = ["Linen Clothes", "Cotton Clothes", "Brocade", "Sachet"];
      const PORTS = [
        "Quanzhou Port",
        "Guangzhou Port",
        "Ningbo Port",
        "Yangzhou Port",
        "Hangzhou Port",
      ];

      const RECIPES = {
        "Linen Clothes": {
          materials: { Hemp: 2 },
          value: 15,
          worker_type: "weaver",
        },
        "Cotton Clothes": {
          materials: { Hemp: 2, Silk: 1 },
          value: 35,
          worker_type: "weaver",
        },
        Brocade: { materials: { Silk: 3 }, value: 60, worker_type: "master" },
        Sachet: {
          materials: { Silk: 1, Tea: 2 },
          value: 80,
          worker_type: "sachet_maker",
        },
      };

      const COMMODITIES = {
        Hemp: { ports: ["Quanzhou Port", "Ningbo Port"], basePrice: [3, 6] },
        Silk: { ports: ["Hangzhou Port", "Yangzhou Port"], basePrice: [6, 10] },
        Tea: {
          ports: ["Guangzhou Port", "Quanzhou Port"],
          basePrice: [10, 14],
        },
      };

      const PRODUCT_PRICES = {
        "Linen Clothes": [30, 42],
        "Cotton Clothes": [50, 65],
        Brocade: [70, 90],
        Sachet: [95, 120],
      };

      const RESOURCE_PROBS = { Hemp: 0.4, Silk: 0.35, Tea: 0.25 };
      const WAGES = { weaver: 8, master: 12, sachet_maker: 20 };

      const BOONS = [
        {
          id: "silk_wind",
          name: "Silk Winds",
          icon: "🌬️",
          desc: "Transport cost for Silk & Silk products is halved this round.",
          modifiers: { transport_silk_discount: 0.5 },
        },
        {
          id: "favorable_tides",
          name: "Favorable Tides",
          icon: "🌊",
          desc: "Base transport cost reduced by 4 Gold this round.",
          modifiers: { transport_flat_discount: 4 },
        },
        {
          id: "merchant_charm",
          name: "Merchant's Charm",
          icon: "✨",
          desc: "15% discount on all port purchases this round.",
          modifiers: { purchase_discount: 0.15 },
        },
        {
          id: "artisan_inspiration",
          name: "Artisan's Inspiration",
          icon: "🔨",
          desc: "All workers produce +1 extra item this round.",
          modifiers: { worker_bonus_production: 1 },
        },
        {
          id: "emergency_loan",
          name: "Emergency Loan",
          icon: "💰",
          desc: "Gain 40 Gold immediately. No strings attached.",
          modifiers: { instant_gold: 40 },
        },
        {
          id: "tax_shelter",
          name: "Tax Shelter",
          icon: "📜",
          desc: "Income tax rate reduced to 5% this round.",
          modifiers: { income_tax_override: 0.05 },
        },
        {
          id: "hemp_monopoly",
          name: "Hemp Monopoly",
          icon: "🧶",
          desc: "Hemp purchase prices reduced by 2 Gold per unit.",
          modifiers: { hemp_price_reduction: 2 },
        },
        {
          id: "master_apprentice",
          name: "Master's Apprentice",
          icon: "🎓",
          desc: "Hiring workers costs 50% less this round.",
          modifiers: { hire_discount: 0.5 },
        },
      ];

      const MODULES = [
        {
          id: "smugglers_hold",
          name: "Smuggler's Hold",
          icon: "🏴‍☠️",
          desc: "Purchase costs -15%. Income Tax +20%.",
        },
        {
          id: "bulk_hauler",
          name: "Bulk Hauler Rigging",
          icon: "🏗️",
          desc: "Transport cost -1 per item. Ship upgrades cost +15 Gold.",
        },
        {
          id: "artisans_workshop",
          name: "Artisan's Workshop",
          icon: "🛠️",
          desc: "Workers produce +1 item. Wages +20%.",
        },
        {
          id: "tax_evasion",
          name: "Tax Evasion Ledger",
          icon: "📕",
          desc: "Income Tax & VAT halved. 15% chance to lose 20 Gold on order complete (Audit).",
        },
        {
          id: "silk_monopoly",
          name: "Silk Road Monopoly",
          icon: "👘",
          desc: "Silk transport cost is 0. Silk product orders yield +20% reward.",
        },
        {
          id: "brokers_network",
          name: "Broker's Network",
          icon: "🕵️",
          desc: "Intel costs 2 Gold. Reveals 2 rumors per purchase.",
        },
        {
          id: "salvage_crane",
          name: "Salvage Crane",
          icon: "♻️",
          desc: "30% chance to refund transport cost on order complete.",
        },
        {
          id: "overdrive_engine",
          name: "Overdrive Engine",
          icon: "⚙️",
          desc: "Transport cost -5 Gold. Maintenance +10 Gold.",
        },
      ];

      // =====================================================================
      // Game State
      // =====================================================================
      const game = {
        inventory: {
          Hemp: 8,
          Silk: 5,
          Tea: 3,
          "Linen Clothes": 0,
          "Cotton Clothes": 0,
          Brocade: 0,
          Sachet: 0,
        },
        money: 100,
        score: 0,
        currentRound: 1,
        maxRounds: 8,
        totalRevenue: 0,
        totalCosts: 0,
        materialCosts: 0,
        workerWages: 0,
        maintenanceCosts: 0,
        vatPaid: 0,
        incomeTaxPaid: 0,
        roundRevenue: 0,
        roundCosts: 0,
        weavers: [],
        masterWeavers: [],
        sachetMakers: [],
        fixedCost: 15,
        shipLevel: 0,
        shipUpgradeCost: [15, 25, 40],
        shipUpgradePenalty: 0,
        maintenancePenalty: 0,
        phase: 0,
        resourceCards: [],
        customerCards: [],
        purchasedCards: new Set(),
        completedOrders: new Set(),
        purchaseCount: 0,
        orderCount: 0,
        gameOver: false,
        modifierFlags: {},
        phase2DemandTags: [],
        revealedIntel: [],
        intelCost: 5,
        intelOrderUsed: false,
        equippedModules: [],
      };

      const logs = [];

      // =====================================================================
      // Utility
      // =====================================================================
      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }
      function choice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }
      function weightedChoice(items) {
        const total = items.reduce((s, [, w]) => s + w, 0);
        let r = Math.random() * total;
        for (const [item, w] of items) {
          r -= w;
          if (r <= 0) return item;
        }
        return items[0][0];
      }
      function log(msg) {
        logs.push(msg);
        if (logs.length > 500) logs.shift();
        renderLog();
      }
      function hasModule(id) {
        return game.equippedModules.some((m) => m.id === id);
      }

      // =====================================================================
      // Calculations
      // =====================================================================
      function calcTransportCost(totalItems, hasSilk = false) {
        let base = totalItems * 2;
        let discount = game.shipLevel * 5;
        if (game.modifierFlags.transport_flat_discount)
          discount += game.modifierFlags.transport_flat_discount;
        let cost = Math.max(5, base - discount);
        if (hasSilk && game.modifierFlags.transport_silk_discount)
          cost = Math.max(
            5,
            Math.floor(cost * game.modifierFlags.transport_silk_discount),
          );
        if (hasModule("bulk_hauler")) cost = Math.max(0, cost - totalItems);
        if (hasModule("overdrive_engine")) cost = Math.max(0, cost - 5);
        if (hasModule("silk_monopoly") && hasSilk) cost = 0;
        return Math.max(0, cost);
      }

      function calcVAT(product, sellingPrice) {
        const recipe = RECIPES[product];
        let matCost = 0;
        for (const [m, a] of Object.entries(recipe.materials)) {
          matCost +=
            ((COMMODITIES[m].basePrice[0] + COMMODITIES[m].basePrice[1]) / 2) *
            a;
        }
        const workerCost = WAGES[recipe.worker_type];
        const taxable = sellingPrice - matCost - workerCost;
        if (taxable > 0) {
          let vat = Math.floor(taxable * 0.05);
          if (hasModule("tax_evasion")) vat = Math.floor(vat * 0.5);
          return vat;
        }
        return 0;
      }

      function calcIncomeTax(preTax) {
        if (preTax <= 0) return 0;
        const rate = game.modifierFlags.income_tax_override || 0.1;
        let tax = Math.floor(preTax * rate);
        if (hasModule("smugglers_hold")) tax = Math.floor(tax * 1.2);
        if (hasModule("tax_evasion")) tax = Math.floor(tax * 0.5);
        return tax;
      }

      function getCardFinalCost(card) {
        let cost = card.totalCost;
        if (game.modifierFlags.purchase_discount)
          cost = Math.floor(cost * (1 - game.modifierFlags.purchase_discount));
        if (game.modifierFlags.hemp_price_reduction) {
          for (const r of card.resources)
            if (r.type === "Hemp")
              cost -= r.quantity * game.modifierFlags.hemp_price_reduction;
        }
        if (hasModule("smugglers_hold")) cost = Math.floor(cost * 0.85);
        return Math.max(0, cost);
      }

      function getHireCost(type) {
        let wage = WAGES[type];
        if (game.modifierFlags.hire_discount)
          wage = Math.floor(wage * (1 - game.modifierFlags.hire_discount));
        return wage;
      }

      // =====================================================================
      // Order/Card Generation
      // =====================================================================
      function genRawOrder(filter = null) {
        const num = rand(1, 3);
        const resources = [];
        const available = [...RESOURCES];
        const port = choice(PORTS);
        let total = 0;
        if (filter && RESOURCES.includes(filter)) {
          const req = rand(2, 5);
          total += req;
          resources.push({ type: filter, required: req });
        } else {
          for (let i = 0; i < num; i++) {
            if (!available.length) break;
            const r = choice(available);
            available.splice(available.indexOf(r), 1);
            const req = rand(2, 5);
            total += req;
            resources.push({ type: r, required: req });
          }
        }
        const base = resources.reduce((s, r) => s + r.required * 5, 0);
        return {
          demandPort: port,
          resources,
          reward: base + rand(10, 25),
          totalItems: total,
          isProductOrder: false,
        };
      }

      function genProductOrder(filter = null) {
        const product =
          filter && PRODUCTS.includes(filter) ? filter : choice(PRODUCTS);
        const req = rand(1, 3);
        const port = choice(PORTS);
        const basePrice = rand(...PRODUCT_PRICES[product]);
        return {
          demandPort: port,
          resources: [{ type: product, required: req }],
          reward: basePrice * req,
          totalItems: req,
          isProductOrder: true,
        };
      }

      function genMixedOrder() {
        if (game.revealedIntel.length && !game.intelOrderUsed) {
          const intel = choice(game.revealedIntel);
          game.intelOrderUsed = true;
          if (RESOURCES.includes(intel.item)) return genRawOrder(intel.item);
          if (PRODUCTS.includes(intel.item)) return genProductOrder(intel.item);
        }
        return Math.random() < 0.5 ? genRawOrder() : genProductOrder();
      }

      function genResourceCard() {
        if (Math.random() < 0.3) return genProductPurchaseCard();
        const num = rand(1, 3);
        const resources = [];
        const available = Object.keys(RESOURCE_PROBS);
        const probs = Object.values(RESOURCE_PROBS);
        const port = choice(PORTS);
        for (let i = 0; i < num; i++) {
          if (!available.length) break;
          let r = Math.random(),
            acc = 0,
            chosen = available[0];
          for (let j = 0; j < available.length; j++) {
            acc += probs[j];
            if (r <= acc) {
              chosen = available[j];
              break;
            }
          }
          const idx = available.indexOf(chosen);
          available.splice(idx, 1);
          probs.splice(idx, 1);
          const qty = rand(1, 3);
          const [min, max] = COMMODITIES[chosen].basePrice;
          const base = rand(min, max);
          const price = COMMODITIES[chosen].ports.includes(port)
            ? base - 1
            : base + 1;
          resources.push({ type: chosen, quantity: qty, price });
        }
        const total = resources.reduce((s, r) => s + r.quantity * r.price, 0);
        return { port, resources, totalCost: total, isProductCard: false };
      }

      function genProductPurchaseCard() {
        const product = choice(PRODUCTS);
        const qty = rand(1, 2);
        const port = choice(PORTS);
        const recipe = RECIPES[product];
        let matCost = 0;
        const details = [];
        for (const [m, a] of Object.entries(recipe.materials)) {
          const avg =
            (COMMODITIES[m].basePrice[0] + COMMODITIES[m].basePrice[1]) / 2;
          matCost += avg * a;
          details.push(`${m}×${a}`);
        }
        const markup = 1.4 + Math.random() * 0.4;
        let unitPrice = Math.floor(matCost * markup);
        const [min, max] = PRODUCT_PRICES[product];
        unitPrice = Math.max(min, Math.min(unitPrice, max));
        return {
          port,
          resources: [
            {
              type: product,
              quantity: qty,
              price: unitPrice,
              materialCost: matCost,
              materialDetails: details.join(" + "),
            },
          ],
          totalCost: unitPrice * qty,
          isProductCard: true,
        };
      }

      // =====================================================================
      // Game Actions
      // =====================================================================
      function applyBoon(boon) {
        game.modifierFlags = boon.modifiers;
        if (boon.modifiers.instant_gold) {
          game.money += boon.modifiers.instant_gold;
          log(`💰 Boon applied: Gained ${boon.modifiers.instant_gold} Gold!`);
        }
        render();
      }

      function purchaseCard(card) {
        if (game.purchasedCards.has(card.id)) return;
        const cost = getCardFinalCost(card);
        if (game.money < cost) {
          log(
            `❌ Insufficient funds! Need ${cost} Gold, Have ${game.money} Gold`,
          );
          return;
        }
        game.money -= cost;
        game.roundCosts += cost;
        game.totalCosts += cost;
        for (const r of card.resources) game.inventory[r.type] += r.quantity;
        game.purchasedCards.add(card.id);
        game.purchaseCount++;
        if (card.isProductCard) {
          const r = card.resources[0];
          log(
            `🛒 Bought Product at ${card.port}: ${ICONS[r.type]}${r.type}×${r.quantity} (@${r.price} Gold/item, Mat Cost ${r.materialCost} Gold), Total ${cost} Gold`,
          );
          log("   💡 Tip: VAT applies when selling finished products");
        } else {
          const txt = card.resources
            .map(
              (r) =>
                `${ICONS[r.type]}${r.type}×${r.quantity}(${r.price} Gold/item)`,
            )
            .join(" + ");
          log(`🛒 Bought at ${card.port}: ${txt}, Total ${cost} Gold`);
          if (cost < card.totalCost)
            log(
              `   ✨ Boon Discount Applied! Saved ${card.totalCost - cost} Gold`,
            );
        }
        log(`📊 Purchased ${game.purchaseCount} cargo batches`);
        triggerJuice();
        render();
      }

      function completeOrder(order) {
        if (game.completedOrders.has(order.id)) return;
        for (const r of order.resources) {
          if ((game.inventory[r.type] || 0) < r.required) {
            log(`❌ Inventory short! Need ${r.type}×${r.required}`);
            return;
          }
        }
        const hasSilk = order.resources.some((r) =>
          ["Silk", "Brocade", "Sachet", "Cotton Clothes"].includes(r.type),
        );
        let transport = calcTransportCost(order.totalItems, hasSilk);
        for (const r of order.resources) game.inventory[r.type] -= r.required;
        let reward = order.reward;
        let totalVat = 0;
        if (order.isProductOrder) {
          const product = order.resources[0].type;
          const unitVat = calcVAT(
            product,
            reward / order.resources[0].required,
          );
          totalVat = unitVat * order.resources[0].required;
          reward -= totalVat;
          game.vatPaid += totalVat;
          log(`🧾 Product Sales VAT: ${totalVat} Gold`);
        }
        game.money -= transport;
        game.roundCosts += transport;
        game.totalCosts += transport;
        const origTransport = transport;
        if (hasModule("silk_monopoly") && hasSilk) {
          reward = Math.floor(reward * 1.2);
          log("👘 Silk Monopoly: +20% Reward!");
        }
        if (hasModule("salvage_crane") && Math.random() < 0.3) {
          game.money += transport;
          log(`♻️ Salvage Crane: Refunded ${transport} Gold transport!`);
          transport = 0;
        }
        if (hasModule("tax_evasion") && Math.random() < 0.15) {
          game.money -= 20;
          log("🚨 AUDIT! Tax Evasion Ledger triggered. Lost 20 Gold!");
        }
        if (transport !== origTransport) {
          const diff = origTransport - transport;
          game.money += diff;
          game.roundCosts -= diff;
          game.totalCosts -= diff;
        }
        game.money += reward;
        game.roundRevenue += reward;
        game.totalRevenue += reward;
        game.score += Math.floor(reward - transport);
        game.completedOrders.add(order.id);
        game.orderCount++;
        const txt = order.resources
          .map((r) => `${ICONS[r.type]}${r.type}×${r.required}`)
          .join(" + ");
        log(`📦 Completed Order at ${order.demandPort}: ${txt}`);
        log(
          `   💰 Reward: ${reward} Gold - ⚓ Freight: ${transport} Gold = 📊 Net Profit: ${reward - transport} Gold`,
        );
        log(`📊 Completed ${game.orderCount} transactions`);
        triggerJuice();
        render();
      }

      function hireWorker(type) {
        const wage = getHireCost(type);
        if (game.money < wage) {
          log("❌ Insufficient funds to hire workers!");
          return;
        }
        const names = {
          weaver: "Weaver",
          master: "Master Weaver",
          sachet_maker: "Sachet Maker",
        };
        const icons = { weaver: "👩‍🔧", master: "👩‍🎨", sachet_maker: "🌸" };
        const list =
          type === "weaver"
            ? game.weavers
            : type === "master"
              ? game.masterWeavers
              : game.sachetMakers;
        list.push({
          task: null,
          progress: 0,
          producedCount: 0,
          isSkilled: false,
        });
        log(
          `${icons[type]} Hired a ${names[type]}! Wage: ${wage} Gold / Round (paid at round end)`,
        );
        triggerJuice();
        render();
      }

      function fireWorker(type, idx) {
        const list =
          type === "weaver"
            ? game.weavers
            : type === "master"
              ? game.masterWeavers
              : game.sachetMakers;
        const wage = WAGES[type];
        const names = {
          weaver: "Weaver",
          master: "Master Weaver",
          sachet_maker: "Sachet Maker",
        };
        if (idx < 0 || idx >= list.length) return;
        if (game.money < wage) {
          log(
            `❌ Insufficient funds for ${names[type]}'s severance: ${wage} Gold`,
          );
          return;
        }
        game.money -= wage;
        const worker = list.splice(idx, 1)[0];
        log(`💔 Dismissed a ${names[type]}. Severance: ${wage} Gold`);
        if (worker.task) log(`  This worker was making: ${worker.task}`);
        render();
      }

      function assignTask(type, task) {
        const list =
          type === "weaver"
            ? game.weavers
            : type === "master"
              ? game.masterWeavers
              : game.sachetMakers;
        const recipe = RECIPES[task];
        for (const worker of list) {
          if (worker.task === null) {
            let can = true;
            for (const [m, a] of Object.entries(recipe.materials))
              if ((game.inventory[m] || 0) < a) {
                can = false;
                break;
              }
            if (!can) {
              log(`❌ Material shortage to produce ${task}!`);
              return;
            }
            for (const [m, a] of Object.entries(recipe.materials))
              game.inventory[m] -= a;
            worker.task = task;
            worker.progress = 0;
            const matTxt = Object.entries(recipe.materials)
              .map(([m, a]) => `${ICONS[m]}${m}×${a}`)
              .join(" + ");
            log(`📋 Assigned: Produce ${ICONS[task]}${task} (Req: ${matTxt})`);
            render();
            return;
          }
        }
        log("❌ All workers are already assigned tasks!");
      }

      function processProduction() {
        const bonus = game.modifierFlags.worker_bonus_production || 0;
        const allLists = [
          { list: game.weavers, name: "Weaver", type: "weaver" },
          { list: game.masterWeavers, name: "Master", type: "master" },
          { list: game.sachetMakers, name: "Maker", type: "sachet_maker" },
        ];
        for (const { list, name, type } of allLists) {
          for (const w of list) {
            if (w.task) {
              let base = w.isSkilled ? 2 : 1;
              let amt = base + bonus;
              if (hasModule("artisans_workshop")) amt += 1;
              game.inventory[w.task] = (game.inventory[w.task] || 0) + amt;
              w.producedCount = (w.producedCount || 0) + amt;
              if (amt > base)
                log(
                  `✅ Skilled ${name} finished ${amt}× ${ICONS[w.task]}${w.task}! (Boon Bonus)`,
                );
              else if (w.isSkilled)
                log(
                  `✅ Skilled ${name} finished 2× ${ICONS[w.task]}${w.task}!`,
                );
              else log(`✅ ${name} finished ${ICONS[w.task]}${w.task}!`);
              if (w.producedCount >= 2 && !w.isSkilled) {
                w.isSkilled = true;
                log(`⭐ ${name} Promotion! Can now produce 2 items per round!`);
              }
              w.task = null;
              w.progress = 0;
            }
          }
        }
      }

      function payWages() {
        let total = 0;
        const countWorkers = (list, type) => {
          let w = 0;
          for (const _ of list) {
            let wage = WAGES[type];
            if (hasModule("artisans_workshop")) wage = Math.floor(wage * 1.2);
            w += wage;
          }
          return w;
        };
        const ww = countWorkers(game.weavers, "weaver");
        const mw = countWorkers(game.masterWeavers, "master");
        const sw = countWorkers(game.sachetMakers, "sachet_maker");
        total = ww + mw + sw;
        if (total === 0) return true;
        if (game.money >= total) {
          game.money -= total;
          game.workerWages += total;
          game.roundCosts += total;
          if (ww > 0)
            log(`💰 Paid wages for ${game.weavers.length} Weavers: ${ww} Gold`);
          if (mw > 0)
            log(
              `💰 Paid wages for ${game.masterWeavers.length} Masters: ${mw} Gold`,
            );
          if (sw > 0)
            log(
              `💰 Paid wages for ${game.sachetMakers.length} Makers: ${sw} Gold`,
            );
          return true;
        }
        log(
          `⚠️ Insufficient funds! Needed: ${total} Gold, Have: ${game.money} Gold`,
        );
        log("💥 Could not pay wages, workers strike...");
        log("💥 Reputation collapsed, forced bankruptcy!");
        return "bankruptcy";
      }

      function payMaintenance() {
        const cost = game.fixedCost + game.maintenancePenalty;
        if (game.money >= cost) {
          game.money -= cost;
          game.maintenanceCosts += cost;
          game.roundCosts += cost;
          game.totalCosts += cost;
          log(`💸 Paid Ship Maintenance Fee: ${cost} Gold`);
          return true;
        }
        if (game.money > 0) {
          const paid = game.money;
          game.money = 0;
          game.maintenanceCosts += paid;
          game.roundCosts += paid;
          game.totalCosts += paid;
          log(`⚠️ Forced payment of ${paid} Gold (Needed ${cost} Gold)`);
          log("⚠️ Funds depleted! Cannot continue sailing...");
          return "bankruptcy";
        }
        return "bankruptcy";
      }

      function endRound() {
        log(`\n📊=== Round ${game.currentRound} Settlement ===`);
        log(`💰 Revenue this round: ${game.roundRevenue} Gold`);
        const totalCost =
          game.roundCosts + game.maintenanceCosts + game.workerWages;
        log(`💸 Total Cost this round: ${totalCost} Gold`);
        log(`   🔧 Maintenance: ${game.maintenanceCosts} Gold`);
        log(`   📦 Materials: ${game.materialCosts} Gold`);
        log(`   👥 Wages: ${game.workerWages} Gold`);
        const preTax = game.roundRevenue - totalCost;
        log(`📈 Pre-tax Profit: ${preTax} Gold`);
        const tax = calcIncomeTax(preTax);
        if (tax > 0) {
          game.money -= tax;
          game.incomeTaxPaid += tax;
          const rate = (game.modifierFlags.income_tax_override || 0.1) * 100;
          log(`🏛️ Income Tax Paid (${rate.toFixed(0)}%): ${tax} Gold`);
        } else log("🏛️ No profit, no income tax due");
        if (game.vatPaid > 0)
          log(`🧾 VAT Paid this round: ${game.vatPaid} Gold`);

        game.modifierFlags = {};
        game.phase2DemandTags = [];
        game.revealedIntel = [];
        game.intelOrderUsed = false;
        game.roundRevenue = 0;
        game.roundCosts = 0;
        game.maintenanceCosts = 0;
        game.materialCosts = 0;
        game.workerWages = 0;
        game.currentRound++;
        if (game.currentRound > game.maxRounds) {
          endGame();
          return;
        }
        log(`\n🔄=== Preparing for Round ${game.currentRound} ===`);
        game.phase = 0;
        game.purchaseCount = 0;
        game.orderCount = 0;
        game.resourceCards = [];
        game.customerCards = [];
        game.purchasedCards.clear();
        game.completedOrders.clear();
        startBoonDrafting();
      }

      function purchaseIntel() {
        if (!game.phase2DemandTags.length) {
          log("🔮 The Broker has no more whispers...");
          render();
          return;
        }
        if (game.money < game.intelCost) {
          log(`❌ Need ${game.intelCost} Gold for a rumor`);
          render();
          return;
        }
        const count = hasModule("brokers_network") ? 2 : 1;
        for (let i = 0; i < count; i++) {
          if (!game.phase2DemandTags.length) break;
          const item = choice(game.phase2DemandTags);
          game.phase2DemandTags.splice(game.phase2DemandTags.indexOf(item), 1);
          const port = choice(PORTS);
          game.revealedIntel.push({ item, port });
          log(
            `🗣️ Broker's Whisper: 'Word from ${port}: High demand for ${item}!'`,
          );
          game.money -= game.intelCost;
        }
        render();
      }

      function upgradeShip() {
        if (game.shipLevel >= 3) return;
        const cost =
          game.shipUpgradeCost[game.shipLevel] + game.shipUpgradePenalty;
        if (game.money < cost) {
          alert(`Need ${cost} Gold`);
          return;
        }
        game.money -= cost;
        game.shipLevel++;
        log(
          `🎉 Ship Upgraded to Level ${game.shipLevel}! +1 Module Slot, +5 Discount`,
        );
        triggerJuice();
        render();
      }

      function equipModule(mod, swapIdx = null) {
        if (swapIdx !== null) {
          const old = game.equippedModules[swapIdx];
          if (old.id === "bulk_hauler") game.shipUpgradePenalty -= 15;
          if (old.id === "overdrive_engine") game.maintenancePenalty -= 10;
          if (old.id === "brokers_network") game.intelCost = 5;
          game.equippedModules[swapIdx] = mod;
          log(`🔄 Swapped ${old.name} for ${mod.name}!`);
        } else {
          if (game.equippedModules.length < game.shipLevel) {
            game.equippedModules.push(mod);
            log(`✅ Installed ${mod.name}!`);
          } else {
            log("❌ No empty slots! Must swap.");
            return;
          }
        }
        if (mod.id === "bulk_hauler") game.shipUpgradePenalty += 15;
        if (mod.id === "overdrive_engine") game.maintenancePenalty += 10;
        if (mod.id === "brokers_network") game.intelCost = 2;
        triggerJuice();
        render();
      }

      // =====================================================================
      // Phase Management
      // =====================================================================
      function startBoonDrafting() {
        game.phase = 5;
        log("\n🧭=== The Navigator's Compass ===");
        log("Choose a Boon to bend the rules of the upcoming voyage...");
        render();
      }

      // [BLIZZARD_FIX] State Machine Regression
      // Previously, selecting a boon routed back to showWelcome(), trapping the player in an infinite loop.
      // Now correctly routes to startPhase1().
      function selectBoon(boon) {
        log(`🧭 Boon Locked In: ${boon.icon} ${boon.name}`);
        applyBoon(boon);
        startPhase1();
      }

      // [BLIZZARD_FIX] Safe DOM Event Binding
      // Avoided injecting JSON directly into HTML onclick attributes to prevent quote-escaping bugs.
      function selectBoonById(id) {
        const boon = BOONS.find((b) => b.id === id);
        if (boon) selectBoon(boon);
      }

      function showWelcome() {
        game.phase = 0;
        log("=".repeat(50));
        log("⚓ Welcome to PortMasters!");
        log("🚢 Sail across ports, build your business empire!");
        log("👥 Hire artisans to craft valuable goods for higher profits!");
        log("=".repeat(50));
        render();
      }

      function startPhase1() {
        game.phase = 1;
        game.purchaseCount = 0;
        game.purchasedCards.clear();
        game.phase2DemandTags = [];
        const allItems = [...RESOURCES, ...PRODUCTS];
        for (let i = 0; i < 5; i++) {
          let t = choice(allItems);
          if (!game.phase2DemandTags.includes(t)) game.phase2DemandTags.push(t);
        }
        game.revealedIntel = [];
        game.intelOrderUsed = false;
        log(`\n⚓=== Round ${game.currentRound} - Phase 1: Port Purchase ===`);
        log(`💰 Current Funds: ${game.money} Gold`);
        game.resourceCards = [];
        for (let i = 0; i < 5; i++) {
          const c = genResourceCard();
          c.id = i;
          game.resourceCards.push(c);
        }
        render();
      }

      function completePhase1() {
        if (game.purchaseCount === 0) log("⏭️ Purchasing skipped");
        else log(`✅ Purchasing ended, bought ${game.purchaseCount} batches`);
        game.phase = "worker_mgmt";
        render();
      }

      function startPhase2() {
        game.phase = 2;
        game.orderCount = 0;
        game.completedOrders.clear();
        log(
          `\n🤝=== Round ${game.currentRound} - Phase 2: Trade Transaction ===`,
        );
        game.customerCards = [];
        for (let i = 0; i < 5; i++) {
          const o = genMixedOrder();
          o.id = i;
          game.customerCards.push(o);
        }
        render();
      }

      function completePhase2() {
        if (game.orderCount === 0) log("⏭️ Trading skipped");
        else log(`✅ Trading ended, completed ${game.orderCount} trades`);
        startPhase3();
      }

      function startPhase3() {
        game.phase = 3;
        log("\n👥=== Processing Worker Production ===");
        processProduction();
        log("\n💰=== Paying Worker Wages ===");
        const wageResult = payWages();
        if (wageResult === "bankruptcy") {
          log("⚠️ Bankruptcy due to inability to pay wages!");
          game.gameOver = true;
          game.phase = "bankruptcy";
          render();
          return;
        }
        log(
          `\n🔧=== Round ${game.currentRound} - Phase 3: Ship Maintenance ===`,
        );
        if (game.money <= 0) {
          log("⚠️ Funds at 0, cannot pay maintenance!");
          game.gameOver = true;
          game.phase = "bankruptcy";
          render();
          return;
        }
        render();
      }

      function doMaintenance() {
        const r = payMaintenance();
        if (r === "bankruptcy") {
          game.gameOver = true;
          game.phase = "bankruptcy";
          render();
          return;
        }
        startPhase4();
      }

      function startPhase4() {
        game.phase = 4;
        log(
          `\n🚢=== Round ${game.currentRound} - Phase 4: Shipyard & Modules ===`,
        );
        render();
      }

      function skipUpgrade() {
        log("⏭️ Skipped Shipyard Actions");
        endRound();
      }

      function endGame() {
        game.gameOver = true;
        game.phase = "endgame";
        log("\n" + "=".repeat(50));
        log("🎮 PortMasters - Game Over!");
        log(`💰 Final Funds: ${game.money} Gold`);
        log(`🏆 Final Reputation: ${game.score}`);
        log(`🧾 Total Taxes Paid: ${game.vatPaid + game.incomeTaxPaid} Gold`);
        let rating;
        if (game.score >= 300) rating = "👑 King of Silk Road";
        else if (game.score >= 200) rating = "🏆 Maritime Tycoon";
        else if (game.score >= 100) rating = "⭐ Successful Merchant";
        else if (game.score >= 50) rating = "👍 Qualified Trader";
        else rating = "🌊 Novice Merchant";
        log(`📈 Rank: ${rating}`);
        log("=".repeat(50));
        localStorage.removeItem("portmasters_save");
        render();
      }

      function restartGame() {
        if (!confirm("Confirm restarting the maritime journey?")) return;
        Object.assign(game, {
          inventory: {
            Hemp: 8,
            Silk: 5,
            Tea: 3,
            "Linen Clothes": 0,
            "Cotton Clothes": 0,
            Brocade: 0,
            Sachet: 0,
          },
          money: 100,
          score: 0,
          currentRound: 1,
          totalRevenue: 0,
          totalCosts: 0,
          materialCosts: 0,
          workerWages: 0,
          maintenanceCosts: 0,
          vatPaid: 0,
          incomeTaxPaid: 0,
          roundRevenue: 0,
          roundCosts: 0,
          weavers: [],
          masterWeavers: [],
          sachetMakers: [],
          shipLevel: 0,
          shipUpgradePenalty: 0,
          maintenancePenalty: 0,
          phase: 0,
          gameOver: false,
          purchaseCount: 0,
          orderCount: 0,
          resourceCards: [],
          customerCards: [],
          purchasedCards: new Set(),
          completedOrders: new Set(),
          modifierFlags: {},
          phase2DemandTags: [],
          revealedIntel: [],
          intelOrderUsed: false,
          equippedModules: [],
          intelCost: 5,
        });
        logs.length = 0;
        localStorage.removeItem("portmasters_save");
        showWelcome();
      }

      function nextPhase() {
        if (game.phase === 1) completePhase1();
        else if (game.phase === "worker_mgmt") startPhase2();
        else if (game.phase === 2) completePhase2();
        else if (game.phase === 3) doMaintenance();
        else if (game.phase === 4) skipUpgrade();
      }

      // =====================================================================
      // Save/Load
      // =====================================================================
      function saveGame() {
        const data = {
          ...game,
          purchasedCards: [...game.purchasedCards],
          completedOrders: [...game.completedOrders],
        };
        try {
          localStorage.setItem("portmasters_save", JSON.stringify(data));
          log("💾 Game Saved!");
          alert("Progress Saved!");
        } catch (e) {
          log(`❌ Save failed: ${e}`);
        }
      }

        try {

      function playSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(
            880,
            ctx.currentTime + 0.1,
          );
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch (e) {}
      }

      function particleBurst() {
        const canvas = document.getElementById("particles-canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext("2d");
        const cx = canvas.width / 2,
          cy = canvas.height / 2;
        const particles = [];
        const colors = ["#FFD700", "#FFA500", "#4CAF50", "#2E5AA7", "#FFFFFF"];
        const emojis = ["✨", "⭐", "💫", "🪙", "🎋"];
        for (let i = 0; i < 35; i++) {
          particles.push({
            x: cx,
            y: cy,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 0.5) * 16 - 4,
            r: 5 + Math.random() * 10,
            color: choice(colors),
            life: 1,
          });
        }
        const texts = [];
        for (let i = 0; i < 5; i++) {
          texts.push({
            x: cx + (Math.random() - 0.5) * 80,
            y: cy + (Math.random() - 0.5) * 80,
            vx: (Math.random() - 0.5) * 6,
            vy: -2 - Math.random() * 3,
            emoji: choice(emojis),
            life: 1,
          });
        }
        let step = 0;
        const animate = () => {
          if (step++ > 30) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
          }
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5;
            p.life -= 0.03;
            if (p.life > 0) {
              ctx.globalAlpha = p.life;
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          for (const t of texts) {
            t.x += t.vx;
            t.y += t.vy;
            t.life -= 0.03;
            if (t.life > 0) {
              ctx.globalAlpha = t.life;
              ctx.font = "24px sans-serif";
              ctx.fillText(t.emoji, t.x, t.y);
            }
          }
          ctx.globalAlpha = 1;
          requestAnimationFrame(animate);
        };
        animate();
      }

            const hasSilk = o.resources.some((r) =>

              const unitVat = calcVAT(
                product,

              totalVat = unitVat * o.resources[0].required;
              netProfit -= totalVat;
            }
            return `
            <div class="card">
              <div class="card-header">📍 ${o.demandPort} ${o.isProductOrder ? "Finished Product Demand" : "Raw Material Demand"}</div>

      function startModuleDrafting() {
        const available = MODULES.filter(
          (m) => !game.equippedModules.some((eq) => eq.id === m.id),
        );
        const pool = available.length >= 3 ? available : MODULES;
        const picks = [];
        const copy = [...pool];
        for (let i = 0; i < 3; i++) {
          if (!copy.length) break;
          const idx = Math.floor(Math.random() * copy.length);
          picks.push(copy.splice(idx, 1)[0]);
        }
        game._draftChoices = picks;
        game.phase = "module_draft";
        render();
      }

        p.innerHTML = `

          .map(
            (m, i) => `

            <div class="module-icon">${m.icon}</div>
            <div class="module-name">${m.name}</div>
            <div class="module-desc">${m.desc}</div>
            <button class="btn btn-gold btn-lg" onclick="handleModuleSelect(${i})">
              ${game.equippedModules.length < game.shipLevel ? "✅ Install" : "🔄 Swap"}
            </button>
          </div>

          )
          .join("")}

        <button class="btn btn-grey" onclick="game.phase=4; render()">⬅️ Back to Shipyard</button>
      </div>
    </div>`;
      }

        const mod = game._draftChoices[idx];

          equipModule(mod);
          game.phase = 4;
          render();

          game._newModule = mod;
          game.phase = "module_swap";
          render();

          nextText = "⏭️ Next Phase";
          nextDisabled = false;

          startAction = "";

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function closeTutorial() {
        localStorage.setItem("portmasters_tutorial_seen", "1");
        closeModal();
      }

      // =====================================================================
      // Keyboard Shortcuts
      // =====================================================================
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "s") {
          e.preventDefault();
          saveGame();
        } else if (e.ctrlKey && e.key === "n") {
          e.preventDefault();
          nextPhase();
        } else if (e.ctrlKey && e.key === "r") {
          e.preventDefault();
          restartGame();
        } else if (e.ctrlKey && e.key === "h") {
          e.preventDefault();
          if (game.phase === 1) completePhase1();
        } else if (e.key === "F1") {
          e.preventDefault();
          showInstructions();
        }
      });

      // =====================================================================
      // Init
      // =====================================================================
      window.addEventListener("load", () => {
        if (localStorage.getItem("portmasters_save")) {
          if (confirm("Detected previous save, continue playing?")) {
            if (loadGame()) return;
          }
        }
        showWelcome();
        if (!localStorage.getItem("portmasters_tutorial_seen")) {
          showTutorial(0);
        }
      });
    </script>
